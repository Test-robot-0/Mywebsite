<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Transfer</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- UPLOAD SCREEN -->

        <div id="uploadScreen">

            <h1>QR Transfer</h1>

            <div class="upload-box" id="drop-area">

                <div id="uploadContent">

                    <p class="bigText">
                        Drag & Drop File
                    </p>

                    <button onclick="document.getElementById('fileElem').click()">
                        Select File
                    </button>

                </div>

                <div id="selectedFileBox" class="hidden">

                    <h2 id="fileName"></h2>

                    <p id="fileSize"></p>

                    <small id="changeFile">
                        Want to change file?
                    </small>

                </div>

                <input type="file" id="fileElem">

            </div>

            <div class="settings">

                <div class="setting">
                    <label>Chunk Size</label>
                    <input type="number" id="chunkSize" value="750">
                </div>

                <div class="setting">
                    <label>QR Speed (0.5s → 10s)</label>
                    <input type="number" id="speed" value="1" min="0.5" max="10" step="0.5">
                </div>

                <button id="generateBtn">
                    Generate QR
                </button>

            </div>

        </div>



        <!-- QR SCREEN -->

        <div id="qrScreen" class="hidden">

            <img id="qrImage">


            <div class="controls">

                <p id="counterText"></p>

                <div class="buttons">

                    <button id="controlBtn">
                        Start
                    </button>

                    <button id="backBtn">
                        Go Back
                    </button>

                </div>

                <div id="specificQRBox" class="hidden smallSearch">

                    <input type="number" id="qrNumberInput" placeholder="QR #">

                    <button id="showSpecificQR">
                        Show
                    </button>

                </div>

            </div>

        </div>


    </div>

    <script src="app.js"></script>

</body>

</html>
